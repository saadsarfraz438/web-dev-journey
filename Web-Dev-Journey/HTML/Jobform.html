<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
  <link rel="stylesheet" href="../css/Jobform.css">
</head>
<body>

  <div class="container">
    <h1 class="center">Job Application Form</h1>
    <p class="description center">Apply today to join our talented team.</p>
    
    <form action="#" method="POST">
      
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="John Doe" required>
      
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="john@example.com" required>
      
      <label for="position">Position Applied For</label>
      <select id="position" required>
        <option value="" disabled selected>Select a role...</option>
        <option value="frontend">Frontend Developer</option>
        <option value="backend">Backend Developer</option>
        <option value="designer">UI/UX Designer</option>
      </select>
      
      <fieldset class="radio-group">
        <legend>Availability</legend>
        
        <input type="radio" id="full-time" name="availability" value="full-time" required>
        <label for="full-time">Full-Time</label>
        
        <input type="radio" id="part-time" name="availability" value="part-time">
        <label for="part-time">Part-Time</label>
      </fieldset>
      
      <label for="message">Cover Letter / Message</label>
      <textarea id="message" rows="5" placeholder="Tell us about yourself..." required></textarea>
      
      <button type="submit">Submit Form</button>
      
    </form>
  </div>

</body>
</html>
