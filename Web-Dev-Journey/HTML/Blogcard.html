<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post Card</title>
  <link rel="stylesheet" href="../css/Blogcard.css">
</head>
<body>

 
  <div class="blog-post-card">
    <img 
      src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" 
      alt="A beautiful scenic workspace view" 
      class="post-img">
    <div class="post-content">
      <h2 class="post-title">Mastering Clean CSS Architectures</h2>
      <p class="post-excerpt">
        Discover the foundational building blocks of modern styling, including advanced grid alignments, optimal padding tricks, and beautiful custom borders.
      </p>
      <a href="#" class="read-more">Read More</a>
    </div>

  </div>

</body>
</html>
